<div class="scale-screen">

  <!-- Period toggle -->
  <div class="period-toggle">
    <button class="period-btn active" data-period="week">Week</button>
    <button class="period-btn" data-period="month">Month</button>
    <button class="period-btn" data-period="year">Year</button>
  </div>

  <!-- Chart -->
  <div class="chart-wrap">
    <div id="chart-tooltip" class="chart-tooltip"></div>
    <svg id="weight-chart" preserveAspectRatio="none"></svg>
  </div>

  <!-- Stats row -->
  <div class="wt-stats">
    <div class="wt-stat">
      <div class="wt-stat-label">Average</div>
      <div class="wt-stat-val" id="stat-avg">—</div>
    </div>
    <div class="wt-stat-divider"></div>
    <div class="wt-stat">
      <div class="wt-stat-label">Min</div>
      <div class="wt-stat-val" id="stat-min">—</div>
    </div>
    <div class="wt-stat-divider"></div>
    <div class="wt-stat">
      <div class="wt-stat-label">Max</div>
      <div class="wt-stat-val" id="stat-max">—</div>
    </div>
  </div>

  <!-- Today input -->
  <div class="today-section">
    <div class="today-header">
      <span class="today-title">Today's weight</span>
      <span class="today-date" id="today-date-label"></span>
    </div>

    <div class="today-input-row">
      <input
        type="number"
        id="weight-input"
        class="weight-input"
        placeholder="—"
        min="30" max="300" step="0.1"
      >
      <span class="weight-unit">kg</span>
    </div>
    <!-- weight-unit is positioned inside the input via CSS -->

    <button class="save-btn" id="save-btn">Save weight</button>
    <div class="save-note" id="save-note"></div>
  </div>

</div>
